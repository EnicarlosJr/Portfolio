<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>
  <script>
    // GitHub Pages redirect for single-page apps
    const path = window.location.pathname.replace(/\/$/, '');
    if (!path.includes('.')) {
      window.location.replace('/Portfolio/#' + path);
    }
  </script>
</head>
<body></body>
</html>
